<!doctype html><html><head><meta charset="utf-8"><title>AniList Unicodifier Direct</title><style>body{font-family:system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 18px;line-height:1.45}fieldset{margin:18px 0;padding:16px;border-radius:12px}label{display:block;margin:10px 0}code{background:#f3f3f3;padding:2px 6px;border-radius:6px}</style></head><body><h1>AniList Unicodifier Direct</h1><p>This version targets AniList's status textarea directly and converts unsupported 4-byte Unicode characters before save.</p><fieldset><legend>Mode</legend><label><input type="radio" name="mode" value="encode"> Encode emoji etc. as numeric HTML entities</label><label><input type="radio" name="mode" value="remove"> Remove unsupported characters</label></fieldset><fieldset><legend>Scope</legend><label><input type="checkbox" id="exactStatusBoxOnly"> Only target <code>Write a status...</code> textarea</label><label><input type="checkbox" id="notify"> Show toast notifications</label></fieldset><button id="save">Save</button> <span id="msg"></span><script src="options.js"></script></body></html>
